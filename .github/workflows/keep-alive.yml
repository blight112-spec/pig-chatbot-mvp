name: Keep DonTalk Space Alive

on:
  schedule:
    # 12시간마다 자동 실행 (UTC 기준 0시, 12시 = 한국 9시, 21시)
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space to prevent sleep
        run: |
          echo "Pinging DonTalk Space at $(date -u)"
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://huggingface.co/spaces/Blight112/pig-chatbot-mvp)
          echo "HTTP Status: $response"
          if [ "$response" = "200" ] || [ "$response" = "302" ]; then
            echo "✅ Space is alive"
          else
            echo "⚠️ Unexpected status code: $response"
          fi
